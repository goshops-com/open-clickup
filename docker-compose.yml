services:
  db:
    image: postgres:16-alpine
    container_name: clickuppp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clickuppp
      POSTGRES_PASSWORD: clickuppp
      POSTGRES_DB: clickuppp
    ports:
      - "5544:5432"
    volumes:
      - clickuppp-data:/var/lib/postgresql/data

volumes:
  clickuppp-data:
